<!-- Это SVG изображение для генерации иконки -->
<!-- Сохраните этот файл и используйте онлайн-конвертер для создания ICO -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Градиентный фон -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1f4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a1f3f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="256" height="256" rx="40" fill="url(#bgGradient)"/>
  
  <!-- Щит -->
  <path d="M128 40 L200 70 L200 140 C200 180 170 210 128 220 C86 210 56 180 56 140 L56 70 Z" 
        fill="url(#shieldGradient)" 
        stroke="#a855f7" 
        stroke-width="4"/>
  
  <!-- Галочка безопасности -->
  <path d="M100 140 L120 160 L160 110" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Буквы IF -->
  <text x="128" y="95" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle" 
        opacity="0.9">IF</text>
</svg>
