name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '11.0.x'
  CONFIGURATION: 'Release'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore InrideFair.sln
      
    - name: Build
      run: dotnet build InrideFair.sln -c ${{ env.CONFIGURATION }} --no-restore
      
    - name: Run tests (if any)
      run: dotnet test InrideFair.sln -c ${{ env.CONFIGURATION }} --no-build --verbosity normal
      
    - name: Publish
      run: |
        dotnet publish InrideFair/InrideFair.csproj `
          -c ${{ env.CONFIGURATION }} `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true `
          -p:DebugType=None `
          -p:DebugSymbols=false `
          -o ./publish
          
    - name: Copy additional files
      run: |
        Copy-Item "InrideFair/config.json" "publish/config.json" -ErrorAction SilentlyContinue
        Copy-Item "README.md" "publish/README.md" -ErrorAction SilentlyContinue
        Copy-Item "CHANGELOG.md" "publish/CHANGELOG.md" -ErrorAction SilentlyContinue
        Copy-Item "LICENSE" "publish/LICENSE" -ErrorAction SilentlyContinue
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: InrideFair-build
        path: ./publish
        retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: InrideFair-build
        path: publish/

    - name: Get version from tag
      id: ver
      shell: bash
      run: echo "v=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

    - name: Create ZIP archive
      id: pkg
      shell: pwsh
      run: |
        $zip = "InrideFair_v${{ steps.ver.outputs.v }}_Windows.zip"
        Compress-Archive -Path publish/* -DestinationPath $zip -Force
        "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Publish GitHub Release
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VER: ${{ steps.ver.outputs.v }}
        ZIP: ${{ steps.pkg.outputs.zip }}
      run: |
        cat > notes.md << NOTES
        ## Inride Fair v${VER}

        Key updates:
        - Refreshed WPF interface and branding
        - Typed threat model and improved scanner internals
        - Automated xUnit tests in CI
        - Updated Release and portable Distribution packaging

        **Requirements:** Windows 10/11 x64, no .NET runtime required.
        **Installation:** Extract the ZIP and run InrideFair.exe as administrator.
        NOTES

        gh release delete "v${VER}" --yes 2>/dev/null || true
        gh release create "v${VER}" \
          --repo "${GITHUB_REPOSITORY}" \
          --title "Inride Fair v${VER}" \
          --notes-file notes.md \
          "${ZIP}"
