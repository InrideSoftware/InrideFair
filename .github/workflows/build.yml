name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '11.0.x'
  CONFIGURATION: 'Release'

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore InrideFair.sln
      
    - name: Build
      run: dotnet build InrideFair.sln -c ${{ env.CONFIGURATION }} --no-restore
      
    - name: Run tests (if any)
      run: dotnet test InrideFair.sln -c ${{ env.CONFIGURATION }} --no-build --verbosity normal
      
    - name: Publish
      run: |
        dotnet publish InrideFair/InrideFair.csproj `
          -c ${{ env.CONFIGURATION }} `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true `
          -p:DebugType=None `
          -p:DebugSymbols=false `
          -o ./publish
          
    - name: Copy additional files
      run: |
        Copy-Item "InrideFair/config.json" "publish/config.json" -ErrorAction SilentlyContinue
        Copy-Item "README.md" "publish/README.md" -ErrorAction SilentlyContinue
        Copy-Item "CHANGELOG.md" "publish/CHANGELOG.md" -ErrorAction SilentlyContinue
        Copy-Item "LICENSE" "publish/LICENSE" -ErrorAction SilentlyContinue
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: InrideFair-build
        path: ./publish
        retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: InrideFair-build
        path: ./publish
        
    - name: Get version from tag
      id: get_version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Create ZIP archive
      id: create_zip
      shell: pwsh
      run: |
        $archiveName = "InrideFair_v${{ steps.get_version.outputs.VERSION }}_Windows.zip"
        Compress-Archive -Path "./publish/*" -DestinationPath "$archiveName" -Force
        "archive_name=$archiveName" >> $env:GITHUB_OUTPUT
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: Inride Fair v${{ steps.get_version.outputs.VERSION }}
        body: |
          ## Release Notes

          Version: v${{ steps.get_version.outputs.VERSION }}

          Key updates in 1.1.0:
          - refreshed WPF interface and branding
          - typed threat pipeline and cleaner scanner internals
          - automated tests in CI
          - updated packaging for Release and portable Distribution builds

          ## Requirements

          - Windows 10/11 x64
          - .NET runtime is not required for packaged releases
          - Administrator rights are recommended for full scan coverage

          ## Installation

          1. Download the ZIP artifact
          2. Extract it to any folder
          3. Run InrideFair.exe
          4. Keep config.json next to the executable
        draft: false
        prerelease: false
        files: ${{ steps.create_zip.outputs.archive_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
